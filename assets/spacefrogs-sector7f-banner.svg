  <rect width="1600" height="900" fill="url(#rain)" opacity="0.8"/>
  <rect x="0" y="520" width="1600" height="380" fill="url(#floor)"/>
  <rect x="0" y="520" width="1600" height="380" fill="url(#grid)" opacity="0.85"/>

