<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SpaceFrogs Sector 7F cinematic banner</title>
  <desc id="desc">A rain-wet biotech industrial SpaceFrogs Sector 7F banner with neon frog signal silhouettes, bioforge veins, cyan storm light and purple corruption.</desc>
  <defs>
    <radialGradient id="g1" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#55ff99" stop-opacity="0.42"/>
      <stop offset="0.34" stop-color="#55e8ff" stop-opacity="0.18"/>
      <stop offset="0.68" stop-color="#b36bff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020504" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07120f"/>
      <stop offset="0.48" stop-color="#0b211b"/>
      <stop offset="1" stop-color="#020504"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
