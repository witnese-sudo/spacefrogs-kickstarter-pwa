<!doctype html>
<html lang="en" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPACEFROGS™ — Mission 0 Feedback</title>
  <style>
    :root{--bg:#020504;--green:#55ff99;--cyan:#55e8ff;--amber:#ffcc66;--text:#ecfff5;--muted:#9fbfb2;--line:rgba(85,255,153,.28)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 20% 0%,rgba(85,255,153,.18),transparent 34%),linear-gradient(180deg,#020504,#06100d 48%,#020504);line-height:1.5}
    .wrap{width:min(980px,calc(100% - 32px));margin:auto;padding:48px 0}
    .panel{border:1px solid var(--line);border-radius:28px;padding:28px;background:linear-gradient(180deg,rgba(7,18,15,.94),rgba(5,12,10,.86));box-shadow:0 24px 90px rgba(0,0,0,.38)}
    .kicker{color:var(--green);text-transform:uppercase;letter-spacing:.18em;font-weight:950;font-size:.82rem;margin-bottom:14px}
    h1{font-size:clamp(2.5rem,6vw,5rem);line-height:.9;margin:0 0 18px;text-transform:uppercase;letter-spacing:-.05em}
    h2{font-size:1.35rem;text-transform:uppercase;color:var(--cyan);margin-top:28px}
    p{color:var(--muted)}
    form{display:grid;gap:14px;margin-top:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    input,select,textarea{width:100%;border:1px solid rgba(85,255,153,.35);border-radius:18px;background:rgba(0,0,0,.28);color:var(--text);padding:14px 16px;font:inherit;outline:none}
    textarea{min-height:120px;resize:vertical}
    label{color:var(--muted);font-weight:700}
    .field{display:grid;gap:7px}
    .wide{grid-column:1 / -1}
    .consent{display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(85,255,153,.18);border-radius:16px;padding:13px 15px;background:rgba(85,255,153,.045);color:var(--muted)}
    .consent input{width:auto;margin-top:4px}
    button{min-height:52px;border:1px solid var(--green);border-radius:999px;background:var(--green);color:#021008;padding:0 23px;font-weight:1000;text-transform:uppercase;cursor:pointer}
    .bot-field{display:none}
    .note{font-size:.92rem;color:var(--muted)}
    @media(max-width:760px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="kicker">SPACEFROGS™ // Mission 0 Feedback</div>
      <h1>First Contact Report</h1>
      <p>Thank you for testing Mission 0. This form captures clarity, pacing, threat, Frog identity and the cinematic signal.</p>

      <form id="mission0-feedback-form" name="spacefrogs-mission0-feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="spacefrogs-mission0-feedback">
        <p class="bot-field"><label>Do not fill this out: <input name="bot-field"></label></p>

        <div class="grid">
          <div class="field"><label>Name / Callsign</label><input name="name" type="text" required></div>
          <div class="field"><label>Email</label><input name="email" type="email" required></div>

          <div class="field"><label>How many players tested?</label>
            <select name="players" required>
              <option value="Solo">Solo</option>
              <option value="2 players">2 players</option>
              <option value="3 players">3 players</option>
              <option value="4 players">4 players</option>
            </select>
          </div>

          <div class="field"><label>Mission result</label>
            <select name="result" required>
              <option value="Frog victory">Frog victory</option>
              <option value="Machine victory">Machine victory</option>
              <option value="Stopped before finish">Stopped before finish</option>
              <option value="Rules unclear">Rules unclear</option>
            </select>
          </div>

          <div class="field"><label>Play time</label>
            <select name="play_time" required>
              <option value="Under 20 minutes">Under 20 minutes</option>
              <option value="20-35 minutes">20–35 minutes</option>
              <option value="35-50 minutes">35–50 minutes</option>
              <option value="Over 50 minutes">Over 50 minutes</option>
            </select>
          </div>

          <div class="field"><label>Would you play another mission?</label>
            <select name="play_again" required>
              <option value="Yes">Yes</option>
              <option value="Maybe">Maybe</option>
              <option value="Not yet">Not yet</option>
            </select>
          </div>

          <div class="field"><label>Rules clarity 1–5</label><input name="rules_clarity" type="number" min="1" max="5" required></div>
          <div class="field"><label>Pacing 1–5</label><input name="pacing" type="number" min="1" max="5" required></div>
          <div class="field"><label>Machine threat 1–5</label><input name="machine_threat" type="number" min="1" max="5" required></div>
          <div class="field"><label>Frog identity 1–5</label><input name="frog_identity" type="number" min="1" max="5" required></div>

          <div class="field wide"><label>Most cinematic moment</label><textarea name="cinematic_moment"></textarea></div>
          <div class="field wide"><label>Most confusing moment</label><textarea name="confusing_moment"></textarea></div>
          <div class="field wide"><label>What should be removed?</label><textarea name="remove_next"></textarea></div>
          <div class="field wide"><label>What should be added next?</label><textarea name="add_next"></textarea></div>

          <label class="consent wide">
            <input type="checkbox" name="consent" value="yes" required>
            <span>I agree that SPACEFROGS™ may store my feedback and contact me about future playtests and launch updates.</span>
          </label>

          <button class="wide" type="submit">Transmit Mission Report</button>
        </div>
      </form>
      <p id="feedback-msg" class="note">Netlify Forms ready: spacefrogs-mission0-feedback</p>
    </section>
  </main>

<script>
const form=document.getElementById('mission0-feedback-form');
const msg=document.getElementById('feedback-msg');
function encode(form){return new URLSearchParams(new FormData(form)).toString();}
if(form){
  form.addEventListener('submit',function(e){
    e.preventDefault();
    msg.textContent='Transmitting mission report...';
    fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:encode(form)})
    .then(function(r){if(!r.ok)throw new Error('Network error');form.reset();msg.textContent='Mission report received. Check Netlify → Forms → spacefrogs-mission0-feedback.';})
    .catch(function(){msg.textContent='Mission report could not transmit yet. Try again after deploy/form detection is active.';});
  });
}
</script>
</body>
</html>
