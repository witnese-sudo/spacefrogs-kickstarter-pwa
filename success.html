<!doctype html>
<html lang="en" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPACEFROGS™ — Signal Received</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#020504;color:#ecfff5;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .panel{width:min(760px,calc(100% - 32px));border:1px solid rgba(85,255,153,.35);border-radius:28px;padding:34px;background:linear-gradient(180deg,rgba(7,18,15,.94),rgba(5,12,10,.88));box-shadow:0 24px 90px rgba(0,0,0,.38)}
    .kicker{color:#55ff99;text-transform:uppercase;letter-spacing:.18em;font-weight:950;font-size:.82rem;margin-bottom:16px}
    h1{font-size:clamp(2.4rem,7vw,5rem);line-height:.9;margin:0 0 20px;text-transform:uppercase}
    p{color:#9fbfb2;font-size:1.1rem}
    a{display:inline-flex;margin-top:18px;min-height:48px;padding:0 20px;align-items:center;justify-content:center;border:1px solid #55ff99;border-radius:999px;color:#ecfff5;text-decoration:none;font-weight:950;text-transform:uppercase;letter-spacing:.05em;background:rgba(85,255,153,.12)}
  </style>
</head>
<body>
  <main class="panel">
    <div class="kicker">SPACEFROGS™ // Signal Received</div>
    <h1>Transmission accepted.</h1>
    <p>Your signal has entered the swamp. Watch for playtest updates, Kickstarter news and the next pulse from FrogLab.</p>
    <a href="/">Return to HQ</a>
  </main>
</body>
</html>
